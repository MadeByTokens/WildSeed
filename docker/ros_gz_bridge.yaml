# ros_gz_bridge config for the WildSeed sensor rig (default `wildseed rig`
# topics; adjust if you changed topic_prefix / model name).
#   ros2 run ros_gz_bridge parameter_bridge --ros-args -p config_file:=<this file>
- gz_topic_name: "rig/cam_left"
  ros_topic_name: "/rig/cam_left"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/cam_right"
  ros_topic_name: "/rig/cam_right"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/wideangle"
  ros_topic_name: "/rig/wideangle"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/rgbd/image"
  ros_topic_name: "/rig/rgbd/image"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/rgbd/depth_image"
  ros_topic_name: "/rig/rgbd/depth_image"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/segmentation/labels_map"
  ros_topic_name: "/rig/segmentation/labels_map"
  gz_type_name: "gz.msgs.Image"
  ros_type_name: "sensor_msgs/msg/Image"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/lidar/points"
  ros_topic_name: "/rig/lidar/points"
  gz_type_name: "gz.msgs.PointCloudPacked"
  ros_type_name: "sensor_msgs/msg/PointCloud2"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/imu"
  ros_topic_name: "/rig/imu"
  gz_type_name: "gz.msgs.IMU"
  ros_type_name: "sensor_msgs/msg/Imu"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/navsat"
  ros_topic_name: "/rig/navsat"
  gz_type_name: "gz.msgs.NavSat"
  ros_type_name: "sensor_msgs/msg/NavSatFix"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/air_pressure"
  ros_topic_name: "/rig/air_pressure"
  gz_type_name: "gz.msgs.FluidPressure"
  ros_type_name: "sensor_msgs/msg/FluidPressure"
  direction: GZ_TO_ROS
- gz_topic_name: "rig/magnetometer"
  ros_topic_name: "/rig/magnetometer"
  gz_type_name: "gz.msgs.Magnetometer"
  ros_type_name: "sensor_msgs/msg/MagneticField"
  direction: GZ_TO_ROS
- gz_topic_name: "/model/sensor_rig/odometry"
  ros_topic_name: "/rig/groundtruth/odometry"
  gz_type_name: "gz.msgs.Odometry"
  ros_type_name: "nav_msgs/msg/Odometry"
  direction: GZ_TO_ROS
